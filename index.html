<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petualangan Kapten Cilik</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="scene-1" class="scene active" style="background-image: url('openingscreen.jpeg');">
        <div class="awan awan-1"></div>
        <div class="awan awan-2"></div>
        <div class="awan awan-3"></div>
        <button class="btn-mulai" onclick="pindahScene(2)">AYO MULAI!</button>
    </div>


    <div id="scene-2" class="scene hidden" style="background-image: url('backgroundscene2.jpeg');">
        
        <div class="glass-panel">
            <h2 class="judul-scene">Siapa Namamu, Kapten?</h2>
            
            <input type="text" id="input-nama" class="input-game" placeholder="Ketik namamu di sini..." autocomplete="off">
            
            <h3 class="sub-judul">Pilih Karaktermu:</h3>
            
            <div class="pilihan-avatar">
                <div class="avatar-card" id="card-cowok" onclick="pilihAvatar('cowok')">
                    <img src="Kapten_Cowok.jpeg" alt="Kapten Cowok">
                </div>
                <div class="avatar-card" id="card-cewek" onclick="pilihAvatar('cewek')">
                    <img src="Kapten_Cewek.jpeg" alt="Kapten Cewek">
                </div>
            </div>

            <button class="btn-lanjut" onclick="cekDataLanjut()">Lanjut Persiapan!</button>
        </div>

    </div>
    <!-- Tambahkan kode ini tepat di bawah penutup </div> scene-2 -->
    <div id="transition-overlay" class="transition-overlay">
        <img src="pesawat-keren.png" alt="Pesawat Kapten Cilik" class="pesawat-animasi-img">
    </div>  

    <div id="scene-3" class="scene hidden" style="background-image: url('backgroundscene3.jpeg');">
        <div class="glass-panel panel-besar">
            <h2 class="judul-scene">Persiapan Seragam, <span id="nama-kapten-display">Kapten</span>!</h2>
            <h3 class="sub-judul">Klik titik berkedip pada seragam untuk belajar fungsinya:</h3>

            <div class="wadah-hotspot">
                <img id="gambar-avatar-scene3" src="Gambar_Hanun.jpeg" alt="Avatar Pilot">
                
                <button class="pin-hotspot belum" id="btn-topi" onclick="klikAtribut('topi')"></button>
                <button class="pin-hotspot belum" id="btn-wing" onclick="klikAtribut('wing')"></button>
                <button class="pin-hotspot belum" id="btn-epaulet" onclick="klikAtribut('epaulet')"></button>
                <button class="pin-hotspot belum" id="btn-dasi" onclick="klikAtribut('dasi')"></button>
            </div>

            <button id="btn-lanjut-scene3" class="btn-lanjut hidden" style="margin-top: 20px;" onclick="pindahScene(4)">Menuju Pesawat!</button>
        </div>

        <div id="popup-atribut" class="popup-overlay hidden">
            <div class="popup-content">
                <h2 id="popup-judul">Nama Atribut</h2>
                <p id="popup-teks">Penjelasan singkat akan muncul di sini.</p>
                <button class="btn-tutup-popup" onclick="tutupPopup()">Mengerti, Kapten!</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
